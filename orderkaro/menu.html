<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf9f7" />
  <title>Menu — Qrave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="menu-page">
  <div class="sticky-menu-header menu-topbar" role="banner">
    <header class="menu-topbar__row">
      <div class="menu-topbar__left">
        <a href="index.html" class="orderkaro-logo-link">
          <img src="images/orderkaro-logo.png" alt="OrderKaro" class="orderkaro-logo orderkaro-logo--menu" />
        </a>
        <a href="index.html" class="menu-topbar__title-wrap restaurant-name-link">
          <h1 class="restaurant-name">Loading…</h1>
        </a>
      </div>
      <div class="menu-topbar__right">
        <button type="button" id="menu-table-badge" class="table-badge" aria-label="Current table">
          <span id="menu-table-badge-text">Table —</span>
          <span id="menu-table-badge-chevron" class="material-symbols-outlined table-badge__chevron" hidden aria-hidden="true">expand_more</span>
        </button>
        <a href="cart" id="top-cart-link" class="menu-topbar__icon-btn" aria-label="Open cart">
          <span class="material-symbols-outlined">shopping_bag</span>
        </a>
        <a href="track" id="top-track-link" class="table-badge table-badge--action" aria-label="Track your orders">
          <span class="material-symbols-outlined">history</span>
          <span>Track Orders</span>
        </a>
      </div>
    </header>
    <div class="menu-topbar__search">
      <label for="menu-search-input" class="visually-hidden">Search menu items</label>
      <input
        id="menu-search-input"
        class="menu-search-input"
        type="search"
        placeholder="Search dishes"
        autocomplete="off"
      />
      <div class="menu-topbar__controls">
        <label class="menu-filter-toggle" for="menu-veg-only-toggle">
          <span class="menu-filter-toggle__label">Pure Veg</span>
          <span class="menu-filter-toggle__switch">
            <input id="menu-veg-only-toggle" type="checkbox" />
            <span class="menu-filter-toggle__slider" aria-hidden="true"></span>
          </span>
        </label>
        <p class="menu-disclaimer" id="menu-image-disclaimer" hidden>
          Image shown is for reference only. Actual dish may vary.
        </p>
      </div>
    </div>
    <div class="menu-loading-strip" id="orderkaro-loading-tabs" aria-live="polite">
      <div class="skeleton skeleton--tabs"></div>
    </div>
  </div>

  <div class="app-shell app-shell--menu" aria-busy="true">
    <div class="banner-error" id="orderkaro-error" role="alert" hidden></div>

    <div class="menu-loading" id="orderkaro-loading" aria-live="polite">
      <div class="skeleton skeleton--card"></div>
      <div class="skeleton skeleton--card"></div>
    </div>
    <div class="menu-editorial-layout">
      <section id="menu-sections" class="menu-editorial-feed" aria-label="Menu"></section>
    </div>
  </div>

  <div class="sticky-cart">
    <div class="sticky-cart__inner">
      <button type="button" id="menu-footer-waiter-btn" class="sticky-cart__waiter-btn" aria-label="Call waiter to your table" hidden>
        <span class="material-symbols-outlined">room_service</span>
        <span>Call Waiter</span>
      </button>
      <a href="cart" id="view-cart-link" class="sticky-cart__cta">
        <span class="sticky-cart__cta-left">
          <span class="sticky-cart__bubble sticky-cart__count">0</span>
          <span class="sticky-cart__cta-label">View Cart</span>
        </span>
        <span class="sticky-cart__total">₹0</span>
      </a>
    </div>
  </div>

  <div id="menu-promotion-popup" class="menu-promotion-popup" hidden aria-hidden="true">
    <button type="button" class="menu-promotion-popup__backdrop" data-promotion-popup-close aria-label="Close promotions"></button>
    <div class="menu-promotion-popup__panel" role="dialog" aria-modal="true" aria-label="Restaurant promotions">
      <button type="button" class="menu-promotion-popup__close" data-promotion-popup-close aria-label="Close promotions">
        <span class="material-symbols-outlined">close</span>
      </button>
      <div id="menu-promotion-popup-track" class="menu-promotion-popup__track" aria-live="polite"></div>
      <div id="menu-promotion-popup-dots" class="menu-promotion-popup__dots"></div>
    </div>
  </div>

  <div id="menu-image-lightbox" class="menu-image-lightbox" hidden aria-hidden="true">
    <button type="button" class="menu-image-lightbox__backdrop" aria-label="Close image preview"></button>
    <div class="menu-image-lightbox__panel" role="dialog" aria-modal="true" aria-labelledby="menu-image-lightbox-title">
      <button type="button" id="menu-image-lightbox-close" class="menu-image-lightbox__close" aria-label="Close image preview">
        <span class="material-symbols-outlined">close</span>
      </button>
      <img id="menu-image-lightbox-img" class="menu-image-lightbox__img" alt="" />
      <div id="menu-image-lightbox-caption" class="menu-image-lightbox__caption" hidden>
        <h3 id="menu-image-lightbox-title" class="menu-image-lightbox__title"></h3>
        <p id="menu-image-lightbox-desc" class="menu-image-lightbox__desc"></p>
      </div>
    </div>
  </div>

  <div id="menu-opening-splash" class="menu-opening-splash" hidden aria-hidden="true">
    <div class="menu-opening-splash__content" aria-hidden="true">
      <h1 class="menu-opening-splash__title">Qrave</h1>
      <p class="menu-opening-splash__tagline">Elevated Dining, Simplified.</p>
      <p class="menu-opening-splash__hours" id="menu-opening-splash-hours" hidden></p>
      <p class="menu-opening-splash__open-days">7 Days Open</p>
    </div>
  </div>

  <button type="button" id="menu-category-fab" class="menu-category-fab" hidden aria-label="Browse menu categories">
    <span class="material-symbols-outlined" aria-hidden="true">menu_book</span>
    <span class="menu-category-fab__label">Menu</span>
  </button>

  <div id="menu-category-gallery" class="menu-category-sheet" hidden aria-hidden="true">
    <button type="button" class="menu-category-sheet__backdrop" data-category-gallery-close aria-label="Close categories"></button>
    <div class="menu-category-sheet__panel" role="dialog" aria-modal="true" aria-labelledby="menu-category-gallery-title">
      <h3 id="menu-category-gallery-title" class="visually-hidden">Menu categories</h3>
      <ul id="menu-category-gallery-list" class="menu-category-sheet__list"></ul>
    </div>
  </div>

  <div id="menu-portion-picker" class="menu-portion-picker" hidden aria-hidden="true">
    <button type="button" class="menu-portion-picker__backdrop" data-portion-picker-close aria-label="Close portion picker"></button>
    <div class="menu-portion-picker__panel" role="dialog" aria-modal="true" aria-labelledby="menu-portion-picker-title">
      <h3 id="menu-portion-picker-title" class="menu-portion-picker__title">Choose portion</h3>
      <p id="menu-portion-picker-item" class="menu-portion-picker__item-name"></p>
      <div id="menu-portion-picker-options" class="menu-portion-picker__options"></div>
      <button type="button" class="menu-portion-picker__cancel" data-portion-picker-close>Cancel</button>
    </div>
  </div>

  <div id="menu-table-picker" class="menu-table-picker" hidden aria-hidden="true">
    <button type="button" class="menu-table-picker__backdrop" data-table-picker-close aria-label="Close table picker"></button>
    <div class="menu-table-picker__panel" role="dialog" aria-modal="true" aria-labelledby="menu-table-picker-title">
      <div class="menu-table-picker__head">
        <h3 id="menu-table-picker-title">Change table</h3>
        <button type="button" class="menu-table-picker__close" data-table-picker-close aria-label="Close table picker">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <label for="menu-table-picker-search" class="visually-hidden">Search tables</label>
      <input id="menu-table-picker-search" class="menu-table-picker__search" type="search" placeholder="Search table number" autocomplete="off" />
      <p id="menu-table-picker-no-match" class="menu-table-picker__no-match" hidden>No matching tables</p>
      <div id="menu-table-picker-loading" class="menu-table-picker__loading" hidden>Loading tables…</div>
      <div id="menu-table-picker-grid" class="start-table-grid"></div>
    </div>
  </div>

  <script type="module" src="js/menu-page.js"></script>
</body>
</html>
