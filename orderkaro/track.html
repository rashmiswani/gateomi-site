<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f9f9f9" />
  <title>Track order — OrderKaro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="track-page">
  <div class="banner-error" id="orderkaro-error" role="alert" hidden></div>

  <header class="track-topbar">
    <div class="track-topbar__inner">
      <div class="track-topbar__brand">
        <span class="material-symbols-outlined track-topbar__menu-icon" aria-hidden="true">restaurant</span>
        <span class="track-topbar__name" id="track-restaurant-name">Restaurant</span>
      </div>
      <div class="track-topbar__end">
        <span class="track-topbar__table-pill" id="track-table-label" aria-label="Table">Table —</span>
      </div>
    </div>
  </header>

  <main class="track-main">
    <section class="track-editorial" aria-labelledby="track-editorial-heading">
      <p class="track-editorial__eyebrow">Current Session</p>
      <h2 id="track-editorial-heading" class="track-editorial__title">Track Your Table</h2>
      <p class="track-editorial__desc" id="track-editorial-desc">
        Managing your culinary journey. All active orders for this table are listed below.
      </p>
    </section>

    <div id="track-orders-empty" class="track-empty" hidden>
      <p class="track-empty__text">No orders for this table yet.</p>
      <a href="menu.html" id="track-empty-menu-link" class="track-empty__link">Browse menu</a>
    </div>

    <div id="track-orders-list" class="track-orders-list" aria-live="polite"></div>
  </main>

  <div class="track-bill-cta-wrap">
    <button type="button" class="track-bill-cta" id="ask-bill-btn" disabled>
      <span class="material-symbols-outlined" aria-hidden="true">payments</span>
      <span>Request Bill</span>
    </button>
  </div>

  <nav class="track-bottom-nav" aria-label="Primary">
    <a href="menu.html" id="track-menu-link" class="track-bottom-nav__item">
      <span class="material-symbols-outlined" aria-hidden="true">menu_book</span>
      <span>Menu</span>
    </a>
    <a href="track.html" id="track-self-link" class="track-bottom-nav__item track-bottom-nav__item--active">
      <span class="material-symbols-outlined" aria-hidden="true">receipt_long</span>
      <span>My Orders</span>
    </a>
  </nav>

  <script type="module" src="js/track-page.js"></script>
</body>
</html>
