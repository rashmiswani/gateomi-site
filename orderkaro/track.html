<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf9f7" />
  <title>Track order — Orderkaro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="banner-error" id="orderkaro-error" role="alert" hidden></div>
  <div class="app-shell app-shell--simple">
    <div class="brand-bar">
      <div class="brand-bar__inner">
        <div class="brand-lockup">
          <a href="index.html" class="orderkaro-logo-link">
            <img src="images/orderkaro-logo.png" alt="OrderKaro" class="orderkaro-logo" width="280" height="38" />
          </a>
          <div class="restaurant-logo-slot" data-restaurant-logo-slot aria-label="Restaurant logo"></div>
        </div>
        <div class="brand-bar__end">
          <a href="menu.html" class="text-link">Menu</a>
          <span class="brand-name brand-name--sub">Restaurant</span>
        </div>
      </div>
    </div>

    <div class="track-header">
      <p class="track-order-id">Order</p>
      <p class="track-order-num">—</p>
      <span class="status-pill">…</span>
    </div>

    <p class="track-hope" id="track-hope" role="status" aria-live="polite"></p>

    <div class="track-placed">
      <span class="track-placed__label">Order placed</span>
      <time class="track-placed__time" id="track-placed-time" datetime="">—</time>
    </div>

    <div class="timeline">
      <div class="timeline__track">
        <div class="timeline__step timeline__step--current">
          <span class="timeline__dot"></span>
          <p class="timeline__label">New</p>
          <p class="timeline__hint">Sent to the restaurant</p>
          <p class="timeline__time" data-step-time="0">—</p>
        </div>
        <div class="timeline__step timeline__step--pending">
          <span class="timeline__dot"></span>
          <p class="timeline__label">Preparing</p>
          <p class="timeline__hint">Your order is being prepared</p>
          <p class="timeline__time" data-step-time="1">—</p>
        </div>
        <div class="timeline__step timeline__step--pending">
          <span class="timeline__dot"></span>
          <p class="timeline__label">Served</p>
          <p class="timeline__hint">On the way to your table</p>
          <p class="timeline__time" data-step-time="2">—</p>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="js/track-page.js"></script>
</body>
</html>
