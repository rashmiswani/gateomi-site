<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf9f7" />
  <title>Cart — Qrave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="app-shell app-shell--cart app-shell--column">
    <div class="brand-bar">
      <div class="brand-bar__inner">
        <div class="brand-lockup">
          <a href="index.html" class="orderkaro-logo-link">
            <img src="images/orderkaro-logo.png" alt="OrderKaro" class="orderkaro-logo" />
          </a>
          <div class="restaurant-logo-slot" data-restaurant-logo-slot aria-label="Restaurant logo"></div>
        </div>
      </div>
    </div>
    <header class="page-header">
      <div class="page-header__row">
        <div>
          <h1 class="restaurant-name restaurant-name--sm">Your order</h1>
          <p class="page-header__meta">…</p>
        </div>
        <a href="menu.html" class="text-link">Add items</a>
      </div>
    </header>

    <div id="cart-mount" class="cart-list"></div>

    <div class="cart-footer">
      <div class="total-row">
        <span class="total-row__label">Total</span>
        <span class="total-row__amount">₹0</span>
      </div>
      <button type="button" class="btn btn--primary btn--block" id="place-order-btn">Place order</button>
    </div>
  </div>
  <script type="module" src="js/cart-page.js"></script>
</body>
</html>
