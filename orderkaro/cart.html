<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf9f7" />
  <title>Cart — Qrave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="cart-page">
  <header class="cart-topbar">
    <div class="cart-topbar__inner">
      <div class="cart-topbar__brand">
        <div class="cart-topbar__icon">
          <span class="material-symbols-outlined">restaurant</span>
        </div>
        <span class="cart-topbar__name">Restaurant</span>
      </div>
      <div class="cart-topbar__table">Table —</div>
    </div>
  </header>

  <div class="app-shell app-shell--cart app-shell--column">
    <main class="cart-content">
      <header class="cart-content__head">
        <h1 class="cart-title">Your Order</h1>
        <p class="cart-subtitle">Review your curated selection</p>
      </header>

      <div id="cart-unavailable-banner" class="cart-unavailable-banner" hidden>
        <span class="material-symbols-outlined">error</span>
        <p>Some items in your cart are unavailable. Please remove them to continue.</p>
      </div>

      <div class="cart-add-more-wrap">
        <a href="menu" id="top-add-link" class="cart-add-more-btn">
          <span class="material-symbols-outlined">add_circle</span>
          <span>Add more items</span>
        </a>
      </div>

      <div id="cart-mount" class="cart-list"></div>

      <div id="cart-suggestions" class="cart-suggestions" hidden></div>

      <section class="cart-special">
        <label for="special-instructions" class="cart-special__label">Special Instructions</label>
        <div class="cart-special-suggestions" id="special-instructions-suggestions"></div>
        <div class="cart-special__box">
          <textarea
            id="special-instructions"
            class="note-field note-field--global"
            rows="3"
            placeholder="Add any notes for the kitchen (allergies, preferences)..."
          ></textarea>
        </div>
      </section>

      <section class="cart-summary" id="cart-summary" hidden>
        <div class="cart-summary__row">
          <span id="summary-subtotal-label">Subtotal</span>
          <span id="summary-subtotal">₹0</span>
        </div>
        <div class="cart-summary__row" id="summary-gst-row" hidden>
          <span id="summary-gst-label">GST (5%)</span>
          <span id="summary-gst">₹0</span>
        </div>
        <div class="cart-summary__total">
          <span id="summary-total-label">Total</span>
          <span id="summary-total">₹0</span>
        </div>
      </section>
    </main>
  </div>

  <div class="cart-bottom-bar">
    <div class="cart-bottom-bar__inner">
      <div class="cart-customer-name" id="cart-customer-name-wrap" hidden>
        <label for="customer-name" class="cart-customer-name__label">Name (optional)</label>
        <div class="cart-customer-name__box">
          <input
            type="text"
            id="customer-name"
            class="cart-customer-name__input"
            maxlength="120"
            placeholder="Who's this order for?"
            autocomplete="name"
          />
        </div>
        <label for="customer-mobile" class="cart-customer-name__label">Mobile number (optional)</label>
        <div class="cart-customer-name__box">
          <input
            type="tel"
            id="customer-mobile"
            class="cart-customer-name__input"
            maxlength="15"
            placeholder="10-digit mobile number"
            autocomplete="tel"
            inputmode="numeric"
          />
        </div>
        <div id="cart-delivery-address-wrap" hidden>
          <label for="delivery-address" class="cart-customer-name__label">Delivery address (required)</label>
          <div class="cart-customer-name__box">
            <textarea
              id="delivery-address"
              class="cart-customer-name__input"
              maxlength="500"
              rows="3"
              placeholder="Enter full delivery address"
            ></textarea>
          </div>
        </div>
      </div>
      <button type="button" class="cart-place-btn" id="place-order-btn">
        <span>Place Order</span>
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
      <nav class="cart-bottom-nav" aria-label="Primary">
        <a href="menu" id="bottom-menu-link" class="cart-bottom-nav__item">
          <span class="material-symbols-outlined">menu_book</span>
          <span>Menu</span>
        </a>
        <a href="track" id="bottom-order-link" class="cart-bottom-nav__item cart-bottom-nav__item--active">
          <span class="material-symbols-outlined">shopping_bag</span>
          <span>Order</span>
        </a>
      </nav>
    </div>
  </div>
  <script type="module" src="js/cart-page.js"></script>
</body>
</html>
