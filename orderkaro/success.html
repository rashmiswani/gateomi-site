<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf9f7" />
  <title>Order placed — Qrave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="app-shell app-shell--simple">
    <div class="brand-bar">
      <div class="brand-bar__inner">
        <div class="brand-lockup">
          <a href="index.html" class="orderkaro-logo-link">
            <img src="images/orderkaro-logo.png" alt="OrderKaro" class="orderkaro-logo" width="280" height="38" />
          </a>
          <div class="restaurant-logo-slot" data-restaurant-logo-slot aria-label="Restaurant logo"></div>
        </div>
      </div>
    </div>
    <div class="success-wrap">
      <div class="success-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <h1 class="success-title">Order received</h1>
      <p class="success-sub">The kitchen has your order. Track status anytime—no account needed.</p>
      <p class="order-number" aria-label="Order number">—</p>
      <a href="track.html" class="btn btn--primary btn--block">Track order</a>
      <p style="margin-top: 22px;">
        <a href="menu.html" class="text-link">Back to menu</a>
      </p>
    </div>
  </div>
  <script type="module" src="js/success-page.js"></script>
</body>
</html>
