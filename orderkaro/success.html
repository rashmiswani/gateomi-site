<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf9f7" />
  <title>Order placed — Qrave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="success-status-page">
  <header class="success-status-topbar">
    <a href="menu" id="success-close-link" class="success-status-topbar__close" aria-label="Close">
      <span class="material-symbols-outlined">close</span>
    </a>
    <h1>Order Status</h1>
    <span class="success-status-topbar__spacer"></span>
  </header>

  <main class="success-status-main">
    <!-- <div class="success-status-hero">
      <div class="success-status-check">
        <span class="material-symbols-outlined">check_circle</span>
      </div>
    </div> -->

    <section class="success-status-copy">
      <h2>Order Received</h2>
      <p>The kitchen is now preparing your meal. Relax and enjoy your experience.</p>
    </section>

    <section class="success-status-ref">
      <span>REFERENCE NUMBER</span>
      <p class="order-number" aria-label="Order number">—</p>
    </section>

    <section class="success-status-total">
      <div>
        <p>Total Price</p>
        <strong id="success-total">—</strong>
      </div>
      <div>
        <p>Ordered At</p>
        <strong id="success-ordered-at">—</strong>
      </div>
    </section>

    <section class="success-status-items">
      <div class="success-status-items__head">
        <span class="material-symbols-outlined">restaurant</span>
        <h3>Item Details</h3>
      </div>
      <ul id="success-items-list"></ul>
    </section>

    <section class="success-status-actions">
      <a href="track" id="success-track-link" class="success-status-btn success-status-btn--primary">Track Order Status</a>
      <a href="menu" id="success-order-again-link" class="success-status-btn success-status-btn--secondary">Menu</a>
    </section>

    <section class="success-status-actions success-status-actions--secondary" aria-label="Order actions">
      <button type="button" id="success-ask-bill-btn" class="success-status-btn success-status-btn--secondary" disabled>
        <span class="material-symbols-outlined" aria-hidden="true">payments</span>
        <span>Request Bill</span>
      </button>
      <button type="button" id="success-cancel-order-btn" class="success-status-btn success-status-btn--secondary" disabled>
        <span class="material-symbols-outlined" aria-hidden="true">cancel</span>
        <span>Request Cancel</span>
      </button>
    </section>

    <p id="success-action-feedback" class="success-status-feedback" hidden></p>
  </main>
  <div id="track-confirm-modal" class="track-confirm-modal" hidden aria-hidden="true">
    <button type="button" class="track-confirm-modal__backdrop" data-confirm-close aria-label="Close"></button>
    <div class="track-confirm-modal__panel" role="dialog" aria-modal="true" aria-labelledby="track-confirm-title">
      <h3 id="track-confirm-title" class="track-confirm-modal__title">Confirm action</h3>
      <p id="track-confirm-message" class="track-confirm-modal__message"></p>
      <div class="track-confirm-modal__actions">
        <button type="button" id="track-confirm-cancel" class="track-confirm-modal__btn track-confirm-modal__btn--ghost">Cancel</button>
        <button type="button" id="track-confirm-yes" class="track-confirm-modal__btn track-confirm-modal__btn--primary">Confirm</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/success-page.js"></script>
</body>
</html>
